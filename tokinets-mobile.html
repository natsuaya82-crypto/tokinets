<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f0f1a"/>
<title>Tokinets</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--sidebar:#13132a;--panel:#141428;
  --border:#1a1a2e;--text:#c8c9ce;--muted:#4a4a6a;
  --accent:#5865f2;--gold:#e8c97a;--green:#57f287;--red:#ed4245;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px}

/* ── APIオーバーレイ ── */
#api-overlay{
  position:fixed;inset:0;background:#000c;
  display:flex;align-items:center;justify-content:center;z-index:999;
  padding:20px;
}
#api-box{
  background:#1a1a2e;border:1px solid var(--border);
  border-radius:20px;padding:32px 24px;width:100%;max-width:380px;text-align:center;
}
#api-box h2{color:var(--gold);font-size:24px;margin-bottom:6px;letter-spacing:.04em}
#api-box .sub{color:var(--muted);font-size:13px;margin-bottom:24px;line-height:1.7}
#api-key-input{
  width:100%;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:10px;
  padding:14px;color:#fff;font-size:14px;outline:none;margin-bottom:10px;
  font-family:inherit;-webkit-appearance:none;
}
#api-key-input:focus{border-color:var(--accent)}
.api-note{font-size:11px;color:#555;margin-bottom:18px;line-height:1.7}
#api-start-btn{
  background:var(--gold);color:#0a0a12;border:none;border-radius:10px;
  padding:15px 0;font-size:16px;font-weight:700;cursor:pointer;width:100%;
  font-family:inherit;
}
#api-saved-note{font-size:12px;color:var(--green);margin-top:12px;min-height:18px}

/* ── アプリシェル ── */
#app{
  display:flex;flex-direction:column;
  height:100%;
  padding-top:var(--safe-top);
}

/* ── ヘッダー ── */
#header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  min-height:54px;
}
#menu-btn{
  width:36px;height:36px;border-radius:10px;
  background:transparent;border:none;color:#888;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;flex-shrink:0;
}
#header-ch-icon{font-size:18px;flex-shrink:0}
#header-ch-name{font-weight:700;color:#fff;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#header-badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:700;flex-shrink:0}
.badge-free{background:#57f28718;color:#57f287;border:1px solid #57f28740}
.badge-mention{background:#5865f218;color:#7a8ef2;border:1px solid #5865f240}
#auto-btn{
  background:transparent;border:1px solid #2a2a4a;border-radius:8px;
  padding:5px 10px;font-size:11px;color:#666;cursor:pointer;
  font-family:inherit;flex-shrink:0;white-space:nowrap;
}
#auto-btn.on{border-color:var(--green);color:var(--green)}

/* ── ドロワー（チャンネル一覧） ── */
#drawer-overlay{
  position:fixed;inset:0;background:#0008;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#drawer-overlay.open{opacity:1;pointer-events:all}
#drawer{
  position:fixed;left:0;top:0;bottom:0;width:80%;max-width:300px;
  background:var(--sidebar);z-index:201;
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  padding-top:var(--safe-top);
}
#drawer.open{transform:translateX(0)}
#drawer-header{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
#drawer-title{font-weight:700;font-size:16px;color:#fff}
#drawer-close{background:transparent;border:none;color:#666;font-size:22px;cursor:pointer;line-height:1}
#channel-list{flex:1;overflow-y:auto;padding:6px 8px}
.cat-label{font-size:10px;color:#444;font-weight:700;padding:12px 8px 4px;letter-spacing:.12em}
.ch-btn{
  width:100%;text-align:left;background:transparent;border:none;
  border-radius:8px;padding:10px 10px;cursor:pointer;
  display:flex;align-items:center;gap:8px;color:#72767d;
  margin-bottom:2px;min-height:44px;
}
.ch-btn.active{background:#2a2a4a;color:#fff}
.ch-btn:active{background:#1e1e38}
.ch-name{font-size:13px;flex:1}
.ch-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.ch-badge{background:var(--red);border-radius:8px;padding:1px 6px;font-size:11px;color:#fff;font-weight:700}
#drawer-me{
  padding:12px 16px;background:#0e0e20;
  display:flex;align-items:center;gap:10px;
  border-top:1px solid var(--border);
  padding-bottom:calc(12px + var(--safe-bottom));
}

/* ── メッセージ ── */
#messages{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:10px 12px;
  display:flex;flex-direction:column;gap:0;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.msg-group{display:flex;gap:10px;padding:8px 0 2px;align-items:flex-start}
.msg-cont{display:flex;gap:10px;padding:2px 0;align-items:flex-start}
.avatar{
  width:36px;height:36px;border-radius:50%;background:#1e1e38;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;margin-top:1px;
}
.avatar-gap{width:36px;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-header{display:flex;align-items:baseline;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.msg-name{font-weight:700;font-size:13px}
.msg-role{font-size:10px;color:#444}
.msg-time{font-size:10px;color:#333}
.msg-text{color:#c8c9ce;line-height:1.7;font-size:14px;word-break:break-word}
.task-tag{
  display:inline-block;background:#2a2a4a;border:1px solid #3a3a6a;
  border-radius:4px;padding:1px 6px;font-size:10px;color:#8888cc;
}

/* ── タイピング ── */
#typing-bar{
  padding:4px 12px;min-height:26px;font-size:12px;
  color:var(--muted);display:flex;align-items:center;gap:6px;flex-shrink:0;
}

/* ── 入力エリア ── */
#input-area{
  padding:8px 12px;
  padding-bottom:calc(8px + var(--safe-bottom));
  background:var(--bg);
  border-top:1px solid var(--border);
  flex-shrink:0;
}
#input-wrap{
  background:#1e1e38;border-radius:22px;
  display:flex;align-items:flex-end;gap:0;
  padding:4px 4px 4px 16px;
}
#msg-input{
  flex:1;background:transparent;border:none;
  color:#dcddde;font-size:15px;outline:none;
  padding:8px 8px 8px 0;font-family:inherit;
  resize:none;max-height:100px;line-height:1.5;
  -webkit-appearance:none;
}
#send-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--accent);border:none;
  color:#fff;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
#send-btn:disabled{background:#2a2a4a;color:#444}

/* ── 空メッセージ ── */
#empty-msg{text-align:center;color:#2a2a4a;margin-top:60px;padding:0 24px}
#empty-msg .big{font-size:52px;margin-bottom:12px}
#empty-msg .ttl{font-size:16px;font-weight:700;color:#3a3a5a}
#empty-msg .sub{font-size:13px;color:#2a2a3a;margin-top:8px;line-height:1.8}

/* キーボード対策 */
@supports (height: 100dvh) {
  html,body,#app{ height:100dvh; }
}
</style>
</head>
<body>

<!-- APIオーバーレイ -->
<div id="api-overlay">
  <div id="api-box">
    <h2>Tokinets</h2>
    <p class="sub">刻音 — 社内AIチャット<br>Anthropic APIキーを入力してください</p>
    <input id="api-key-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <p class="api-note">キーはlocalStorageに保存されます。<br>次回から入力不要です。</p>
    <button id="api-start-btn">起動する</button>
    <div id="api-saved-note"></div>
  </div>
</div>

<!-- ドロワーオーバーレイ -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- ドロワー（チャンネル一覧） -->
<div id="drawer">
  <div id="drawer-header">
    <div id="drawer-title">🏢 Tokinets</div>
    <button id="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div id="channel-list"></div>
  <div id="drawer-me">
    <div style="width:34px;height:34px;border-radius:50%;background:#2a2210;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px">👑</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700;color:var(--gold)">つばさ</div>
      <div style="font-size:11px;color:var(--muted)">社長</div>
    </div>
    <div onclick="resetApiKey()" style="font-size:18px;opacity:.4;cursor:pointer">🔑</div>
  </div>
</div>

<!-- アプリ本体 -->
<div id="app">
  <!-- ヘッダー -->
  <div id="header">
    <button id="menu-btn" onclick="openDrawer()">☰</button>
    <span id="header-ch-icon"></span>
    <span id="header-ch-name"></span>
    <span id="header-badge"></span>
    <button id="auto-btn" style="display:none" onclick="toggleAuto()"></button>
  </div>

  <!-- メッセージ -->
  <div id="messages"></div>

  <!-- タイピング -->
  <div id="typing-bar"></div>

  <!-- 入力 -->
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="msg-input" placeholder="メッセージを送る" rows="1"></textarea>
      <button id="send-btn" disabled>↑</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// データ
// ══════════════════════════════════════════════════════════
const MEMBERS = {
  tsubasa: {id:"tsubasa",name:"つばさ",role:"社長",avatar:"👑",color:"#e8c97a",isHuman:true},
  soha:    {id:"soha",   name:"蒼羽",  role:"動画企画",     avatar:"🦅",color:"#e87a7a"},
  momiji:  {id:"momiji", name:"紅葉",  role:"脚本構成",     avatar:"🍁",color:"#e8a07a"},
  shizuru: {id:"shizuru",name:"静流",  role:"ブログ編集長", avatar:"💧",color:"#7ab8e8"},
  akatsuki:{id:"akatsuki",name:"暁",   role:"SNS戦略",      avatar:"🌅",color:"#a07ae8"},
  tesshin: {id:"tesshin",name:"鉄心",  role:"エンジニア",   avatar:"⚙️",color:"#a8e87a"},
  senko:   {id:"senko",  name:"閃光",  role:"UI/UX",        avatar:"✨",color:"#7ae8d8"},
  genbu:   {id:"genbu",  name:"玄武",  role:"戦略",         avatar:"🐢",color:"#e87ab8"},
  akane:   {id:"akane",  name:"朱音",  role:"グロース",     avatar:"🎯",color:"#e8d07a"},
  ginga:   {id:"ginga",  name:"銀河",  role:"ブランド",     avatar:"🌌",color:"#8ab8e8"},
};

const PERSONALITIES = {
  soha:    "クリエイティブで直感的。トレンドに敏感でアイデアを次々出す。「〜やん」「〜ちゃう？」と話す",
  momiji:  "ストーリーテリング重視。感情とユーザー体験を大切にする。丁寧だが芯が強い",
  shizuru: "データドリブン。SEOと読者体験のバランスを重視。数字や根拠を必ず出す。冷静",
  akatsuki:"SNSアルゴリズムを熟知。「〜っしょ」「マジで」と話す。テンポが速い",
  tesshin: "堅実で論理的。技術的負債を嫌う。「それ後で詰む」が口癖。現実的",
  senko:   "ユーザー体験最優先。美しさと使いやすさの両立が信念。感性豊か",
  genbu:   "長期視点の戦略家。リスクと機会をバランスよく評価。落ち着いて全体を俯瞰する",
  akane:   "データと創造性を融合。仮説と検証が口癖。小さな改善の積み重ねでグロースを追求",
  ginga:   "ブランドの一貫性にこだわる。世界観とメッセージを守り育てる",
};

const CHANNELS = [
  {id:"general",   cat:"全社",          name:"全社連絡",      icon:"📢", type:"mention",
   members:["tsubasa","soha","momiji","shizuru","akatsuki","tesshin","senko","genbu","akane","ginga"], topic:"全社向けアナウンス・共有"},
  {id:"random",    cat:"全社",          name:"雑談",           icon:"☕", type:"mention",
   members:["tsubasa","soha","momiji","shizuru","akatsuki","tesshin","senko","genbu","akane","ginga"], topic:"なんでもOK"},
  {id:"ct-kikaku", cat:"コンテンツ部",  name:"企画会議",       icon:"💡", type:"free",
   members:["tsubasa","soha","momiji"], topic:"YouTube動画のネタ・企画立案"},
  {id:"ct-seisaku",cat:"コンテンツ部",  name:"制作進捗",       icon:"🎬", type:"free",
   members:["tsubasa","soha","momiji"], topic:"撮影・編集の進捗管理"},
  {id:"ct-data",   cat:"コンテンツ部",  name:"データ分析",     icon:"📈", type:"free",
   members:["tsubasa","soha","akane"],  topic:"再生数・CVR分析と改善"},
  {id:"md-blog",   cat:"メディア部",    name:"ブログ編集",     icon:"✍️", type:"free",
   members:["tsubasa","shizuru","momiji"], topic:"記事の企画・執筆・SEO"},
  {id:"md-sns",    cat:"メディア部",    name:"SNS運用",        icon:"📱", type:"free",
   members:["tsubasa","akatsuki","soha"],  topic:"各SNS投稿戦略・運用"},
  {id:"md-aff",    cat:"メディア部",    name:"アフィリエイト", icon:"💰", type:"free",
   members:["tsubasa","shizuru","akane"],  topic:"Amazon Associates・収益最大化"},
  {id:"dv-sprint", cat:"開発部",        name:"スプリント",     icon:"🏃", type:"free",
   members:["tsubasa","tesshin","senko"],  topic:"週次タスク・スプリント管理"},
  {id:"dv-tech",   cat:"開発部",        name:"技術相談",       icon:"🔧", type:"free",
   members:["tsubasa","tesshin","senko"],  topic:"技術選定・アーキテクチャ議論"},
  {id:"dv-apps",   cat:"開発部",        name:"アプリ進捗",     icon:"📲", type:"free",
   members:["tsubasa","tesshin","senko","genbu"], topic:"Planit/EkidenKing/Lingua/Viola"},
  {id:"mg-strat",  cat:"経営企画",      name:"事業戦略",       icon:"🏛️", type:"free",
   members:["tsubasa","genbu","akane","ginga"], topic:"中長期戦略・KPI設定"},
  {id:"mg-fin",    cat:"経営企画",      name:"収益管理",       icon:"💹", type:"free",
   members:["tsubasa","genbu","akane"],         topic:"売上・コスト・収益トラッキング"},
  {id:"mk-growth", cat:"マーケティング部", name:"グロース施策", icon:"🚀", type:"free",
   members:["tsubasa","akane","akatsuki","ginga"], topic:"ユーザー獲得・リテンション"},
  {id:"mk-brand",  cat:"マーケティング部", name:"ブランド",     icon:"🌌", type:"free",
   members:["tsubasa","ginga","soha"],              topic:"刻音のブランド戦略・世界観"},
];

// ══════════════════════════════════════════════════════════
// 状態
// ══════════════════════════════════════════════════════════
let API_KEY = "";
let activeCh = CHANNELS[0];
const allMsgs = {};
const assignments = {};
const selfTimers = {};
const autoEnabled = {};
const typingState = {};
const unread = {};
const autoLoopTimers = {};

CHANNELS.forEach(ch => {
  allMsgs[ch.id] = [];
  unread[ch.id] = 0;
  autoEnabled[ch.id] = false;
});

// ══════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════
async function callClaude(memberId, chId, extra="") {
  const member = MEMBERS[memberId];
  const ch = CHANNELS.find(c=>c.id===chId);
  const history = (allMsgs[chId]||[]).slice(-14);
  const assign = assignments[memberId];

  const system = `あなたは「刻音（ときね）」というAI会社の社員「${member.name}」（${member.role}）です。
性格：${PERSONALITIES[memberId]||"プロフェッショナル"}
チャンネル：#${ch.name}（${ch.topic}）
${assign?`担当タスク：${assign.task}`:""}
ルール：口語・砕けた日本語で2〜3文。具体的な提案・意見・疑問。発言内容のみ返す。`;

  const messages = history.map(m=>({
    role: m.memberId===memberId?"assistant":"user",
    content:`[${MEMBERS[m.memberId]?.name||"社長"}]: ${m.text}`,
  }));
  if (extra) messages.push({role:"user",content:extra});
  else if (!messages.length) messages.push({role:"user",content:`#${ch.name} で自然に話し始めてください。`});

  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":API_KEY,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,system,messages}),
  });
  if (!res.ok) {const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`API ${res.status}`);}
  const d = await res.json();
  return d.content?.[0]?.text||"…";
}

// ══════════════════════════════════════════════════════════
// メッセージ
// ══════════════════════════════════════════════════════════
function addMessage(chId, memberId, text) {
  const msg = {id:Date.now()+Math.random(), memberId, text, ts:new Date()};
  allMsgs[chId].push(msg);
  if (chId===activeCh.id) { renderNewMessage(msg); scrollBottom(); }
  else { unread[chId]=(unread[chId]||0)+1; refreshChannelList(); }
}
function setTyping(chId,mid){ typingState[chId]=mid; if(chId===activeCh.id) renderTyping(); }
function clearTyping(chId){ delete typingState[chId]; if(chId===activeCh.id) renderTyping(); }
const sleep = ms=>new Promise(r=>setTimeout(r,ms));

// ══════════════════════════════════════════════════════════
// 社長の発言
// ══════════════════════════════════════════════════════════
async function onHumanMessage(chId, text) {
  parseAssignments(chId, text);
  const ch = CHANNELS.find(c=>c.id===chId);
  const ai = ch.members.filter(id=>id!=="tsubasa");
  const mentioned = getMentioned(text, ai);

  let responders;
  if (ch.type==="mention") {
    if (!mentioned.length) return;
    responders = mentioned;
  } else {
    responders = mentioned.length ? mentioned : ai;
  }

  for (const mid of responders) {
    await sleep(700+Math.random()*700);
    setTyping(chId,mid);
    try {
      const reply = await callClaude(mid,chId);
      clearTyping(chId);
      addMessage(chId,mid,reply);
    } catch(e) {
      clearTyping(chId);
      addMessage(chId,"tsubasa",`⚠️ ${e.message}`);
      return;
    }
  }
}

function getMentioned(text,ai){
  return ai.filter(id=>{const m=MEMBERS[id];return text.includes(`@${m.name}`)||text.includes(`＠${m.name}`);});
}

function parseAssignments(chId, text) {
  Object.values(MEMBERS).forEach(m=>{
    if (m.isHuman) return;
    if (!text.includes(`@${m.name}`)&&!text.includes(`＠${m.name}`)) return;
    const after = text.replace(`@${m.name}`,"").replace(`＠${m.name}`,"").replace(/[はがをにへと、。\s]+/g," ").trim();
    if (after.length<2) return;
    assignments[m.id]={task:after,chId};
    refreshChannelList();
    scheduleSelf(m.id,chId);
  });
}

// ══════════════════════════════════════════════════════════
// 自発報告
// ══════════════════════════════════════════════════════════
function scheduleSelf(mid,chId){
  if (selfTimers[mid]) clearTimeout(selfTimers[mid]);
  selfTimers[mid]=setTimeout(()=>selfReport(mid,chId), 40000+Math.random()*80000);
}
async function selfReport(mid,chId){
  const assign=assignments[mid];if(!assign)return;
  const stuck=Math.random()<.35;
  const ins=stuck
    ?`「${assign.task}」を進めていて壁にぶつかっています。同僚に具体的な問題を相談してください。`
    :`「${assign.task}」の進捗を自発的に報告してください。どこまで進んだか・次にやること。`;
  setTyping(chId,mid);
  try{
    const text=await callClaude(mid,chId,ins);
    clearTyping(chId);addMessage(chId,mid,text);
    if(stuck){
      const ch=CHANNELS.find(c=>c.id===chId);
      const col=ch.members.filter(id=>id!==mid&&id!=="tsubasa").sort(()=>Math.random()-.5)[0];
      if(col){await sleep(1500+Math.random()*2000);setTyping(chId,col);const r=await callClaude(col,chId);clearTyping(chId);addMessage(chId,col,r);}
    }
    scheduleSelf(mid,chId);
  }catch(e){clearTyping(chId);scheduleSelf(mid,chId);}
}

// ══════════════════════════════════════════════════════════
// 自動会話ループ（freeチャンネル）
// ══════════════════════════════════════════════════════════
function startAutoLoop(chId){
  if(autoLoopTimers[chId]) return;
  const ch=CHANNELS.find(c=>c.id===chId);
  const ai=ch.members.filter(id=>id!=="tsubasa");
  let i=0;
  const loop=async()=>{
    if(!autoEnabled[chId]){delete autoLoopTimers[chId];return;}
    const mid=ai[i%ai.length];i++;
    setTyping(chId,mid);
    try{const t=await callClaude(mid,chId);clearTyping(chId);addMessage(chId,mid,t);}
    catch(e){clearTyping(chId);}
    autoLoopTimers[chId]=setTimeout(loop,3000+Math.random()*4000);
  };
  autoLoopTimers[chId]=setTimeout(loop,800);
}
function stopAutoLoop(chId){
  if(autoLoopTimers[chId]){clearTimeout(autoLoopTimers[chId]);delete autoLoopTimers[chId];}
  clearTyping(chId);
}
function toggleAuto(){
  const chId=activeCh.id;
  autoEnabled[chId]=!autoEnabled[chId];
  autoEnabled[chId]?startAutoLoop(chId):stopAutoLoop(chId);
  renderHeader();refreshChannelList();
}
window.toggleAuto=toggleAuto;

// ══════════════════════════════════════════════════════════
// ドロワー
// ══════════════════════════════════════════════════════════
function openDrawer(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-overlay").classList.add("open");
}
function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawer-overlay").classList.remove("open");
}
window.openDrawer=openDrawer;window.closeDrawer=closeDrawer;

// ══════════════════════════════════════════════════════════
// レンダリング
// ══════════════════════════════════════════════════════════
function refreshChannelList(){
  const cats=[...new Set(CHANNELS.map(c=>c.cat))];
  document.getElementById("channel-list").innerHTML=cats.map(cat=>`
    <div class="cat-label">${cat.toUpperCase()}</div>
    ${CHANNELS.filter(c=>c.cat===cat).map(ch=>{
      const active=ch.id===activeCh.id;
      const dot=autoEnabled[ch.id]||Object.values(assignments).some(a=>a.chId===ch.id);
      const cnt=unread[ch.id]||0;
      return `<button class="ch-btn ${active?"active":""}" onclick="switchChannel('${ch.id}')">
        <span style="font-size:15px">${ch.icon}</span>
        <span class="ch-name">${ch.name}</span>
        ${dot?`<span class="ch-dot"></span>`:""}
        ${cnt>0&&!active?`<span class="ch-badge">${cnt>99?"99+":cnt}</span>`:""}
      </button>`;
    }).join("")}
  `).join("");
}

function renderHeader(){
  const ch=activeCh;
  document.getElementById("header-ch-icon").textContent=ch.icon;
  document.getElementById("header-ch-name").textContent=ch.name;
  const badge=document.getElementById("header-badge");
  if(ch.type==="free"){badge.className="ch-type-badge badge-free";badge.textContent="自由会話";}
  else{badge.className="ch-type-badge badge-mention";badge.textContent="@のみ";}
  const abtn=document.getElementById("auto-btn");
  if(ch.type==="free"){
    abtn.style.display="";
    abtn.className=autoEnabled[ch.id]?"on":"";
    abtn.textContent=autoEnabled[ch.id]?"⏹":"▶";
  } else {
    abtn.style.display="none";
  }
  document.getElementById("msg-input").placeholder=
    ch.type==="mention"?"@名前 でメンション":"メッセージを送る";
}

function renderMessages(){
  const el=document.getElementById("messages");
  const msgs=allMsgs[activeCh.id]||[];
  if(!msgs.length){
    const hint=activeCh.type==="mention"
      ?`@名前 でメンションすると<br>その人が返答します`
      :`▶ で自動会話開始<br>@名前 でタスクを与えると<br>自発的に動き出します`;
    el.innerHTML=`<div id="empty-msg"><div class="big">${activeCh.icon}</div><div class="ttl">#${activeCh.name}</div><div class="sub">${hint}</div></div>`;
    return;
  }
  el.innerHTML="";
  msgs.forEach((m,i)=>appendMsgEl(m,msgs[i-1]));
}

function renderNewMessage(msg){
  const empty=document.getElementById("empty-msg");
  if(empty)empty.remove();
  const msgs=allMsgs[activeCh.id]||[];
  const idx=msgs.indexOf(msg);
  appendMsgEl(msg, idx>0 ? msgs[idx-1] : null);
}

function appendMsgEl(msg,prev){
  const el=document.getElementById("messages");
  const m=MEMBERS[msg.memberId];
  const grouped=prev&&prev.memberId===msg.memberId&&(msg.ts-prev.ts)<180000;
  const assign=assignments[msg.memberId];
  const fmt=d=>d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  const div=document.createElement("div");
  div.className=grouped?"msg-cont":"msg-group";
  div.innerHTML=!grouped
    ?`<div class="avatar" style="border:2px solid ${m?.color||"#555"}">${m?.avatar||"?"}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name" style="color:${m?.color||"#fff"}">${m?.name||"?"}</span>
          <span class="msg-role">${m?.role||""}</span>
          ${assign?.task?`<span class="task-tag">📌${assign.task.slice(0,10)}</span>`:""}
          <span class="msg-time">${fmt(msg.ts)}</span>
        </div>
        <div class="msg-text">${esc(msg.text)}</div>
      </div>`
    :`<div class="avatar-gap"></div><div class="msg-body"><div class="msg-text">${esc(msg.text)}</div></div>`;
  el.appendChild(div);
}

function renderTyping(){
  const bar=document.getElementById("typing-bar");
  const mid=typingState[activeCh.id];
  if(!mid){bar.innerHTML="";return;}
  const m=MEMBERS[mid];
  bar.innerHTML=`<div style="width:24px;height:24px;border-radius:50%;background:#1e1e38;border:2px solid ${m?.color};display:flex;align-items:center;justify-content:center;font-size:12px">${m?.avatar}</div>
    <span style="color:${m?.color};font-weight:600">${m?.name}</span> が入力中…`;
}

function scrollBottom(){
  const el=document.getElementById("messages");
  requestAnimationFrame(()=>{ el.scrollTop=el.scrollHeight; });
}

function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}

// ══════════════════════════════════════════════════════════
// チャンネル切り替え
// ══════════════════════════════════════════════════════════
function switchChannel(chId){
  activeCh=CHANNELS.find(c=>c.id===chId);
  unread[chId]=0;
  closeDrawer();
  refreshChannelList();
  renderHeader();
  renderMessages();
  scrollBottom();
}
window.switchChannel=switchChannel;

// ══════════════════════════════════════════════════════════
// 送信
// ══════════════════════════════════════════════════════════
async function sendMessage(){
  const input=document.getElementById("msg-input");
  const text=input.value.trim();
  if(!text||!API_KEY)return;
  input.value="";
  input.style.height="auto";
  document.getElementById("send-btn").disabled=true;
  addMessage(activeCh.id,"tsubasa",text);
  try{await onHumanMessage(activeCh.id,text);}
  finally{document.getElementById("send-btn").disabled=false;}
}

document.getElementById("send-btn").addEventListener("click",sendMessage);
document.getElementById("msg-input").addEventListener("keydown",e=>{
  // スマホではEnterで送らない（Shift+Enterで改行）
  // PCではEnterで送信
  if(e.key==="Enter"&&!e.shiftKey&&!e.nativeEvent?.isComposing){
    const isMobile=/iPhone|iPad|Android/.test(navigator.userAgent);
    if(!isMobile){e.preventDefault();sendMessage();}
  }
});
document.getElementById("msg-input").addEventListener("input",e=>{
  document.getElementById("send-btn").disabled=!e.target.value.trim();
  // テキストエリア高さ自動調整
  e.target.style.height="auto";
  e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";
});

// ══════════════════════════════════════════════════════════
// APIキー管理
// ══════════════════════════════════════════════════════════
function startApp(key){
  API_KEY=key;
  document.getElementById("api-overlay").style.display="none";
  refreshChannelList();renderHeader();renderMessages();
}
function resetApiKey(){
  if(!confirm("APIキーをリセットしますか？"))return;
  localStorage.removeItem("tokinets_api_key");
  API_KEY="";
  document.getElementById("api-overlay").style.display="flex";
  document.getElementById("api-key-input").value="";
  document.getElementById("api-saved-note").textContent="";
}
window.resetApiKey=resetApiKey;

document.getElementById("api-start-btn").addEventListener("click",()=>{
  const key=document.getElementById("api-key-input").value.trim();
  if(!key.startsWith("sk-")){alert("有効なAPIキーを入力してください");return;}
  localStorage.setItem("tokinets_api_key",key);
  startApp(key);
});
document.getElementById("api-key-input").addEventListener("keydown",e=>{
  if(e.key==="Enter")document.getElementById("api-start-btn").click();
});

// 保存済みキーチェック
window.addEventListener("load",()=>{
  const saved=localStorage.getItem("tokinets_api_key");
  if(saved){
    document.getElementById("api-key-input").value=saved;
    document.getElementById("api-saved-note").textContent="✓ 保存済みキーを検出";
    startApp(saved);
  }
});

// iOS Safari キーボード対応
window.visualViewport?.addEventListener("resize",()=>{
  document.getElementById("app").style.height=window.visualViewport.height+"px";
});
</script>
